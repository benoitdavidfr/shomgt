        originalBboxDM:
          SW: 22°24,00'S - 040°16,00'E
          NE: 22°16,00'S - 040°27,00'E
        bboxDM:
          SW: 22°25,40'S - 040°16,30'E
          NE: 22°17,40'S - 040°27,30'E
      - title: D - Iles Bassas da India
