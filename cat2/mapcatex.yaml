title: définition du schéma du catalogue des cartes Shom, illustré par des cas-types, ainsi que des écarts aux sources du Shom
description: |
  Ce document définit le schéma du catalogue, l'illustre par des cas-types et définit des écarts voulus par rapport aux sources du Shom.
  Ce schéma décrit le catalogue des cartes stocké en Yaml et en pser ainsi que celui exposé en JSON.
$id: http://geoapi.fr/shomgt/cat2/mapcatex
$schema:
  title: schema JSON du catalogue des cartes Shom
  $id: http://geoapi.fr/shomgt/cat2/mapcatex#$schema
  modified: '2020-12-13T13:00+01:00'
  description: |
    Ce schéma décrit le catalogue des cartes et les écarts voulus par rapport aux sources du Shom.
    On distingue le concept de carte de celui de GéoTIFF.
      - une carte correspond à la feuille de papier ; elle est identifiée par le Shom par un numéro généralement à 4 chiffres 
        précédé par les lettres 'FR' ;
        des corrections, numérotées en séquence à partir de 1, peuvent lui être appliquées définissant ainsi des versions
        successives de la carte.
        Une carte décrit généralement un espace géographique dit principal et comprend souvent des cartouches,
        chacun décrivant un espace géographique dit secondaire,
      - on appelle GéoTIFF l'image d'un fichier GéoTIFF qui peut être dans différents formats
    Une carte correspond à un GéoTIFF principal, correspondant à l'espace principal, lorsqu'il existe,
    et éventuellement des GéoTIFF secondaires, correspondants chacun à un cartouche.
    Quelques cartes comportent uniquement un ensemble de cartouches et ne comportent aucun espace principal.
  $schema: http://json-schema.org/schema#
  definitions:
    dateIso8601:
      description: date au format ISO 8601 limité aux cas les plus fréquents
      type: string
      pattern: '^\d\d\d\d-\d\d-\d\d(T\d\d:\d\d(:\d\d(\.\d+)?)?)?([+-]\d\d:\d\d|Z)?$'
      examples:
        - '2020-01-10'
        - '2020-01-10T16:33'
        - '2020-01-10T16:33:34.56'
        - '2020-01-10T16:33:34.56+01:00'
        - '2020-01-10T16:33:34.56Z'
        - '2020-01-10T16:33+01:00'
        - '2020-01-10+01:00'
      counterexamples:
        - '2020-01-10T16'
    scaleDenominator:
      description: dénominateur de l'échelle avec . comme séparateur des milliers
      type: string
      pattern: '^\d{1,3}(\.\d{3})*$'
      examples:
        - '5'
        - '500'
        - '1.500'
        - '23.600'
        - '123.800'
        - '1.123.600'
        - '12.123.600'
        - '123.123.600'
      counterexamples:
        - '1500'
        - '15.00'
    latLonDM:
      description: couple (latitude, longitude) en degrés minutes
      pattern: "^\\d+°(\\d+(,\\d+)?)?'(N|S) - \\d+°(\\d+(,\\d+)?)?'(E|W)$"
      examples:
        - "44°09,00'N - 002°36,00'W"
        - "45°49,00'N - 001°00,00'W"
    bboxDM:
      description: boite englobante définie par ses 2 coins SW et NE, en degrés, minutes en WGS84
      type: object
      required: [SW, NE]
      additionalProperties: false
      properties:
        SW:
          description: latitude et longitude du coin SW en degrés minutes
          $ref: '#/definitions/latLonDM'
        NE:
          description: latitude et longitude du coin NE en degrés minutes
          $ref: '#/definitions/latLonDM'
    latitudeDM:
      description: latitude en degrés minutes
      pattern: "^\\d+°(\\d+(,\\d+)?)?'(N|S)$"
      examples:
        - "44°09,00'N"
    longitudeDM:
      description: longitude en degrés minutes
      pattern: "^\\d+°(\\d+(,\\d+)?)?'(E|W)$"
      examples:
        - "001°00,00'W"
    dcmi-box:
      description: boite englobante au format DCMI-Box en degrés, minutes en WGS84
      type: object
      required: [southlimit, westlimit, northlimit, eastlimit]
      additionalProperties: false
      properties:
        southlimit:
          description: latitude minimum
          $ref: '#/definitions/latitudeDM'
        westlimit:
          description: longitude minimum
          $ref: '#/definitions/longitudeDM'
        northlimit:
          description: latitude maximum
          $ref: '#/definitions/latitudeDM'
        eastlimit:
          description: longitude maximum
          $ref: '#/definitions/longitudeDM'
  type: object
  required: [ title, $id, $schema, modified, maps ]
  additionalProperties: false
  properties:
    title: { description: 'titre du document', type: string }
    description: { description: 'commentaire sur le document', type: string }
    $id: { description: 'identifiant du document', type: string , format: uri }
    $schema: { description: 'schema JSON du document', $ref: http://json-schema.org/schema# }
    created: { description: 'date de création initiale du document', $ref: '#/definitions/dateIso8601' }
    modified: { description: 'date de dernière modification du document', $ref: '#/definitions/dateIso8601' }
    maps:
      description: dictionnaire des cartes indexées sur leur numéro précédé de 'FR'
      type: object
      additionalProperties: false
      patternProperties:
        ^FR\d\d\d\d:
          description: |
            Description d'une carte.
            Une carte ne comportant pas d'espace principal ne comporte pas les champs scaleDenominator et bboxDM
            et comporte alors obligatoirement des cartouches.
            Les cartes, dites d'intérêt, cad celles décrivant des espaces sur lesquels la France exerce ses droits,
            sont identifiées par la propriété mapsFrenchAreas ;
            elles devraient renseigner les propriétés modified et lastUpdate.
          type: object
          additionalProperties: false
          required: [title, edition]
          properties:
            castype:
              description: propriété uniquement utilisé pour décrire les cas-types
              type: string
            groupTitle:
              description: sur-titre optionnel identifiant un ensemble de cartes
              type: string
              example:
                - Océan Pacifique Sud
            title:
              description: titre de la carte
              type: string
              example:
                - Côte Ouest de Corse - Du Cap Corse au Golfe d'Ajaccio
            edition:
              description: édition de la carte indiquée par le Shom
              type: string
              examples:
                - Édition n° 3 - 2018
                - Publication 2017
            mapsFrenchAreas:
              description: |
                identifie les cartes dites d'intérêt, cad décrivant les espaces sur lesquels la France exerce ses droits.
                Une telle carte doit intersecter la ZEE française ; cependant quelques cartes satisfasant ce critère sont exclues ;
                elles son listées dans le champ cartesAyantUnIntérêtInsuffisant.
                Cette propriété est présente ssi la carte intersecte la ZEE française.
                Sa valeur est false ssi c'est une des exceptions.
              type: boolean
            modified:
              description: |
                date de la dernière correction, ou si aucune correction date initiale ; si inconnue date des MD.
                Ce champ devrait être présent pour les cartes d'intérêt.
              $ref: '#/definitions/dateIso8601'
            lastUpdate:
              description: |
                no de la dernière correction de la carte, 0 si aucune correction.
                Ce champ devrait être présent pour les cartes d'intérêt.
              type: integer
              minimum: 0
            scaleDenominator:
              description: |
                dénominateur de l'échelle de l'espace principal avec un . comme séparateur des milliers,
                absent ssi la carte ne comporte pas d'espace principal
              $ref: '#/definitions/scaleDenominator'
            bboxDM:
              description: |
                boite englobante de l'espace principal de la carte en degrés, minutes en WGS84,
                ces coordonnées sont celles indiquées sur la carte dans les coins SW et NE.
                Champ absent ssi la carte ne comporte pas d'espace principal
              $ref: '#/definitions/bboxDM'
            spatial:
              description: la même boite encodée au format DCMI-Box, optionnelle avec l'objectif d'améliorer l'interopérabilité.
              $ref: '#/definitions/dcmi-box'
            replaces:
              description: carte remplacée par la carte courante, optionnel
              type: string
            references:
              description: ssi la carte est un fac-similé alors référence de la carte étrangère reproduite
              type: string
            note:
              description: commentaire associé à la carte
              type: string
            hasPart:
              description: liste éventuelle de cartouches
              type: array
              items:
                type: object
                additionalProperties: false
                required: [title, scaleDenominator, bboxDM]
                properties:
                  title:
                    description: titre du cartouche
                    type: string
                  scaleDenominator:
                    description: dénominateur de l'échelle avec un . comme séparateur des milliers
                    $ref: '#/definitions/scaleDenominator'
                  bboxDM:
                    description: boite englobante du cartouche en degrés, minutes en WGS84
                    $ref: '#/definitions/bboxDM'
                  spatial:
                    description: la même boite encodée en DCMI-Box, optionnelle avec l'objectif d'améliorer l'interopérabilité.
                    $ref: '#/definitions/dcmi-box'
    cartesAjoutéesAuServiceWfs:
      description: liste quelques cartes ajoutées au service WFS du Shom, indexées sur leur numéro précédé de 'FR'
      type: object
      additionalProperties: false
      patternProperties:
        ^FR\d\d\d\d:
          description: description de la carte
          type: object
          additionalProperties: false
          required: [title, scaleDenominator, outerBBoxLonLatDd]
          properties:
            title: { description: 'titre de la carte préfixé par son numéro', type: string }
            scaleDenominator:
              description: dénominateur de l'échelle de l'espace principal avec un . comme séparateur des milliers,
              $ref: '#/definitions/scaleDenominator'
            outerBBoxLonLatDd:
              description: boite englobante extérieure en LonLat, en degrés décimaux et en WGS84, [lonMin, latMin, lonMax, latMax]
              type: array
              items:
                type: number
                minimum: -180
                maximum: 180
            note: { description: 'commentaire', type: string }
    modificationsDuGAN:
      description: Définit des modifications à effectuer sur les enregistrements du GAN.
      type: object
      additionalProperties: false
      patternProperties:
        ^FR\d\d\d\d:
          description: Description de la modification d'une carte.
          type: object
          additionalProperties: false
          required: [title, reasonForModification]
          properties:
            title: { description: titre correct de la carte, type: string}
            reasonForModification: { description: motif de la modification, type: string }
            originalTitle: { description: titre original de la carte à corriger, type: string }
            edition: { description: édition de la carte indiquée par le Shom, type: string }
            references: { description: référence à la carte étrangère reproduite par le Shom, type: string }
            scaleDenominator:
              description: dénominateur de l'échelle de l'espace principal avec un . comme séparateur des milliers.
              $ref: '#/definitions/scaleDenominator'
            originalBboxDM:
              description: boite englobante à corriger de l'espace principal de la carte en degrés, minutes en WGS84,
              $ref: '#/definitions/bboxDM'
            bboxDM:
              description: boite englobante corrigée de l'espace principal de la carte en degrés, minutes en WGS84,
              $ref: '#/definitions/bboxDM'
            hasPart:
              description: |
                liste des cartouches, nécessaire si des modifications doivent être apportées à ces cartouches.
                L'ordre des cartouches doit être le même que dans les données d'origine.
              type: array
              items:
                type: object
                required: [title]
                properties:
                  title: { description: titre du cartouche correct, type: string }
                  originalTitle: { description: titre du cartouche à corriger, type: string }
                  reasonForModification: { description: motif de la modification de ce cartouche, type: string }
                  scaleDenominator:
                    description: dénominateur de l'échelle avec un . comme séparateur des milliers
                    $ref: '#/definitions/scaleDenominator'
                  originalBboxDM:
                    description: boite englobante à corriger du cartouche en degrés, minutes en WGS84
                    $ref: '#/definitions/bboxDM'
                  bboxDM:
                    description: boite englobante corrigée du cartouche en degrés, minutes en WGS84
                    $ref: '#/definitions/bboxDM'
    cartesAjoutéesAuGan:
      description: |
        Liste les cartes absente du GAN.
      type: object
      additionalProperties: false
      patternProperties:
        ^FR\d\d\d\d:
          description: description de la carte
          type: object
          additionalProperties: false
          required: [title, reasonForModification, bboxDM, edition]
          properties:
            title: { description: titre de la carte, type: string }
            reasonForModification: { description: motif de la modification, type: string }
            edition: { description: édition de la carte indiquée par le Shom, type: string }
            scaleDenominator:
              description: dénominateur de l'échelle de l'espace principal avec un . comme séparateur des milliers.
              $ref: '#/definitions/scaleDenominator'
            bboxDM:
              description: boite englobante corrigée de l'espace principal de la carte en degrés, minutes en WGS84,
              $ref: '#/definitions/bboxDM'
    cartesAyantUnIntérêtInsuffisant:
      description: |
        Liste les cartes dont l'intérêt est insuffisant pour décrire les espaces sur lesquels la France exerce ses droits.
      type: object
      additionalProperties: false
      patternProperties:
        ^FR\d\d\d\d:
          description: description de la carte
          type: object
          additionalProperties: false
          required: [title, scaleDenominator, reason]
          properties:
            title: { description: 'titre de la carte préfixé par son numéro', type: string }
            scaleDenominator:
              description: dénominateur de l'échelle de l'espace principal avec un . comme séparateur des milliers.
              $ref: '#/definitions/scaleDenominator'
            reason: { description: motif de l'insuffisance, type: string }
    eof:
      description: propriété marquant la fin du fichier
      type: 'null'
created:  '2020-12-13T17:00+01:00'
modified: '2020-12-13T17:00+01:00'
