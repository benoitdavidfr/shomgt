title: cat - catalogue des cartes raster GéoTIFF du SHOM
path: /geoapi/shomgt/cat
doc: |
  Ce module gère un catalogue des cartes pertinentes du Shom afin:
    - de connaitre celles qu'il est nécessaire de commander au Shom (ajout ou actualisation) et celles qu'il faut supprimer
    - d'exposer les caractéristiques des cartes utilisées par le module de mise à jour des cartes
    
  Le catalogue doit être régulièrement actualisé, il est construit à partir de 2 sources du Shom:
    - le flux WFS de la liste des cartes Shom
    - les Groupes d'Avis aux Navigateurs (GAN) qui fournissent chaque semaine des corrections sur les cartes
  
  Mise en oeuvre:
    - le script build.php permet de lire le flux WFS et les GANs correspondants
      - il fabrique un fichier mapcat.pser qui est un catalogue des cartes.
        Il contient un cliché des GANs construit à une date donnée.
        Le champ maps est un dictionnaire des cartes indexé sur l'id de la carte.
      - les cartes sont structurées par la classe MapCat (définie dans mapcat.inc.php)
        qui permet d'accéder par différentes méthodes du catalogue.
      - le catalogue est exposé en JSON et en GeoJSON
    - le script index.php :
      - expose en JSON les cartes stockées dans mapcat.pser (action=showGan),
    - le script map.php affiche le catalogue sous la forme d'une carte
    - le script geojson.php fournit le flux GéoJSON du catalogue, il est utilisé par la carte
    - le script mapcat.php permet de consulter le catalogue
      - par défaut il liste les cartes en HTML
      - accès à la description d'une carte
      - affichage de la carte Leaflet centrée et zoomée sur la carte Shom

journal: |
  12/12/2020:
    - l'impossibilité d'interroger les GAN sans fournir de date d'origine remet en cause la logique de construction du catalogue
    - dans la version actuelle je reconstruis le catalogue à chaque moisson à partir du flux WFS et des GAN
    - il vaut peut être mieux considérer que j'ai un catalogue fiabilisé dans ../ws/shomgt.yaml et que je cherche à détecter
      - si de nouvelles corrections ont été publiées
      - éventuellement la péremption de certaines cartes et l'ajout de nouvelle carte
  19/11/2020:
    - les URL GAN doivent être de la forme https://www.shom.fr/qr/gan/FR7440/1721
      où FR7440 est l'identifiant de la carte et 1721 est le no de semaine (semaine 21 de 2017)
      à partir de laquelle les avis sont demandés
    - la possibilité d'interroger les GAN depuis l'origine de la carte semble avoir été supprimée
    - le code ne prend pas encore en compte correctement cette évolution
  26/2/2020:
    - la mise à jour ne fonctionne pas
    - il semble que le Shom ait changé l'exposition du GAN
    - il est nécessaire de modifier le code pour prendre cette modification en compte
  8/11/2019:
    - ajout de la possibilité de créer un catalogue en pser à partir de sa version GeoJSON
  29/10/2019:
    - ajout des cartes AEM et MancheGrid
  26/10/2019:
    - simplification du catalogue par suppression de l'historique inutile
  15-17/3/2019:
    - refonte importante
    - prises en compte de corrections du GAN définies dans gancorrections.yaml
    - Ces corrections permettent de visualiser les petites iles du canal du Mozambique
    - Le fichier shomgt.yaml peut être généré à partir des GAN
    - Il manque encore la possibilité de gérer l'ordre des cartes. FAIT
    
