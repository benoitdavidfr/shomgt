<!DOCTYPE HTML><html><head><title>ShomgtCatMap</title><meta charset='UTF-8'>
<!-- meta nécessaire pour le mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel='stylesheet' href='https://benoitdavidfr.github.io/leaflet/llmap.css'>
  <!-- Leaflet download -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.4.0/dist/leaflet.css"
    integrity="sha512-puBpdR0798OZvTTbP4A8Ix/l+A4dHDD0DGqYW6RQ+9jxkRFclaxxQb/SJAWZfWAkuyeQUytO7+7N4QKrDh+drA=="
    crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.4.0/dist/leaflet.js"
    integrity="sha512-QVftwZFqvtRNi0ZyCtsznlKSWOStnDORoefr1enyq5mVL4tmKB3S/EnC3rRJcxCPavG10IcrVGSmPh6Qw5lwrg=="
    crossorigin=""></script>
  <!-- plug-in Control.Coordinates -->
  <link rel='stylesheet' href='https://benoitdavidfr.github.io/leaflet/Control.Coordinates.css'>
  <script src='https://benoitdavidfr.github.io/leaflet/Control.Coordinates.js'></script>
  <!-- plug-in d'appel des GeoJSON en AJAX -->
  <script src='https://benoitdavidfr.github.io/leaflet/leaflet-ajax.js'></script>
  <!-- plug-in leaflet.edgebuffer -->
  <script src='https://benoitdavidfr.github.io/leaflet/leaflet.edgebuffer.js'></script>
</head>
<body>
  <div id='map' style='height: 100%; width: 100%'></div>
  <script>
  var shomgtgithuburl = 'https://benoitdavidfr.github.io/shomgt/';
  var map = L.map('map').setView([46.5, 3], 6); // view pour la zone
  // activation du plug-in Control.Coordinates
  var c = new L.Control.Coordinates();
  c.addTo(map);
  map.on('click', function(e) {
  	c.setCoordinates(e);
  });
  // affichage de l'échelle
  L.control.scale({position:'bottomleft', metric:true, imperial:false}).addTo(map);
  var attrshom = "&copy; <a href='http://data.shom.fr/' target='_blank'>Shom</a>";
  var baseLayers = {
    "Cartes IGN" : new L.TileLayer(
      'https://igngp.geoapi.fr/tile.php/cartes/{z}/{x}/{y}.jpg',
      {"format":"image/jpeg","minZoom":0,"maxZoom":18,"attribution":"&copy; <a href='http://www.ign.fr'>IGN</a>"}
    ),
  };
  map.addLayer(baseLayers["Cartes IGN"]);
  
  var onEachFeature = function (feature, layer) {
    layer.bindPopup('<pre>'+JSON.stringify(feature.properties,null,' ')+'</pre>');
    layer.bindTooltip(feature.properties.num+' - '+feature.properties.title);
  }
  var overlays = {
    "ZEE" : new L.GeoJSON.AJAX(shomgtgithuburl+'france.geojson', {
      style: { color: 'blue'}, minZoom: 0, maxZoom: 18, onEachFeature: onEachFeature
    }),
    "< 1/10M" : new L.GeoJSON.AJAX(shomgtgithuburl+'cat10M.geojson', {
      style: { color: 'green'}, minZoom: 0, maxZoom: 18, onEachFeature: onEachFeature
    }),
    "1/10M - 1/6.5M" : new L.GeoJSON.AJAX(shomgtgithuburl+'cat6.5M.geojson', {
      style: { color: 'green'}, minZoom: 0, maxZoom: 18, onEachFeature: onEachFeature
    }),
    "1/6.5M - 1/2.5M" : new L.GeoJSON.AJAX(shomgtgithuburl+'cat2.5M.geojson', {
      style: { color: 'green'}, minZoom: 0, maxZoom: 18, onEachFeature: onEachFeature
    }),
    "1/2.5M - 1/1.1M" : new L.GeoJSON.AJAX(shomgtgithuburl+'cat1.1M.geojson', {
      style: { color: 'green'}, minZoom: 0, maxZoom: 18, onEachFeature: onEachFeature
    }),
    "1/1.1M - 1/700k" : new L.GeoJSON.AJAX(shomgtgithuburl+'cat700k.geojson', {
      style: { color: 'green'}, minZoom: 0, maxZoom: 18, onEachFeature: onEachFeature
    }),
    "1/700k - 1/375k" : new L.GeoJSON.AJAX(shomgtgithuburl+'cat375k.geojson', {
      style: { color: 'green'}, minZoom: 0, maxZoom: 18, onEachFeature: onEachFeature
    }),
    "1/375k- 1/200k" : new L.GeoJSON.AJAX(shomgtgithuburl+'cat200k.geojson', {
      style: { color: 'green'}, minZoom: 0, maxZoom: 18, onEachFeature: onEachFeature
    }),
    "1/200k - 1/100k" : new L.GeoJSON.AJAX(shomgtgithuburl+'cat100k.geojson', {
      style: { color: 'green'}, minZoom: 0, maxZoom: 18, onEachFeature: onEachFeature
    }),
    "1/100k - 1/50k" : new L.GeoJSON.AJAX(shomgtgithuburl+'cat50k.geojson', {
      style: { color: 'green'}, minZoom: 0, maxZoom: 18, onEachFeature: onEachFeature
    }),
    "1/50k - 1/25k" : new L.GeoJSON.AJAX(shomgtgithuburl+'cat25k.geojson', {
      style: { color: 'green'}, minZoom: 0, maxZoom: 18, onEachFeature: onEachFeature
    }),
    "1/50k - 1/25k" : new L.GeoJSON.AJAX(shomgtgithuburl+'cat25k.geojson', {
      style: { color: 'green'}, minZoom: 0, maxZoom: 18, onEachFeature: onEachFeature
    }),
    "1/25k - 1/12.5k" : new L.GeoJSON.AJAX(shomgtgithuburl+'cat12.5k.geojson', {
      style: { color: 'green'}, minZoom: 0, maxZoom: 18, onEachFeature: onEachFeature
    }),
    ">= 1/12.5k" : new L.GeoJSON.AJAX(shomgtgithuburl+'cat0.geojson', {
      style: { color: 'green'}, minZoom: 0, maxZoom: 18, onEachFeature: onEachFeature
    }),
  };
  map.addLayer(overlays["1/1.1M - 1/700k"]);
  L.control.layers(baseLayers, overlays).addTo(map);
  </script>
</body></html>
